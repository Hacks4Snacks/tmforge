name: pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/ThreatModelForge.Studio/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least privilege plus the tokens the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Studio (static demo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ThreatModelForge.Studio
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ThreatModelForge.Studio/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (demo: offline stub, no /v1 engine)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_DEMO: 'true'
        run: npm run build

      - name: SPA 404 fallback
        # GitHub Pages has no server-side fallback; serve index.html for unknown paths.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/ThreatModelForge.Studio/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
