name: ci

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Build
        run: dotnet build dirs.proj -c Release

      - name: Test
        run: dotnet test dirs.proj -c Release --no-build

  studio:
    name: Studio build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ThreatModelForge.Studio
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ThreatModelForge.Studio/package-lock.json

      - name: Install
        run: npm ci

      - name: Test (type-check + Vitest)
        run: npm test

      - name: Build (production bundle)
        run: npm run build

  wasm:
    name: WASM engine build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      # The browser-wasm project is opt-in (BuildWasm) and excluded from dirs.proj,
      # so publish it directly. This catches interop signature drift and trimming
      # regressions that the default build/test never exercises.
      - name: Install WASM workloads
        run: dotnet workload install wasm-tools wasm-experimental

      - name: Publish WASM engine (Release, trimmed)
        run: dotnet publish src/ThreatModelForge.Wasm/ThreatModelForge.Wasm.csproj -c Release -o artifacts/wasm

      - name: Assert trimmed bundle manifest
        run: |
          set -euo pipefail
          fw=artifacts/wasm/wwwroot/_framework
          need() { test -f "$fw/$1" || { echo "::error::$1 missing from WASM bundle ($2)"; exit 1; }; }
          need dotnet.js "runtime host"
          need ThreatModelForge.Wasm.wasm "JSExport interop layer"
          # Engine assemblies must survive trimming (rooted via ILLink.Descriptors.xml).
          for a in Core Editing Formats Analysis Analysis.Rules Reporting Engine; do
            need "ThreatModelForge.$a.wasm" "engine assembly trimmed away"
          done
          # .tm7 round-trip (DataContractSerializer) and DTO IO (System.Text.Json) must stay wired.
          need System.Private.DataContractSerialization.wasm ".tm7 serialization"
          need System.Text.Json.wasm "DTO JSON serialization"
          echo "WASM bundle OK: $(ls "$fw"/*.wasm | wc -l | tr -d ' ') assemblies"

  containers:
    name: Container build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Build CLI image (amd64, load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: tmforge-cli:ci
          cache-from: type=gha,scope=tmforge-cli
          cache-to: type=gha,mode=max,scope=tmforge-cli

      - name: Smoke test CLI (tmforge --version)
        run: docker run --rm tmforge-cli:ci --version

      - name: Build API image (amd64, load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile.api
          load: true
          tags: tmforge:ci
          cache-from: type=gha,scope=tmforge
          cache-to: type=gha,mode=max,scope=tmforge

      - name: Smoke test API (/v1/health)
        run: |
          set -euo pipefail
          docker run -d --name tmforge-api -p 8080:8080 tmforge:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/v1/health >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          docker logs tmforge-api || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::tmforge API did not become healthy on /v1/health"
            exit 1
          fi
          echo "Smoke test passed:"
          curl -fsS http://127.0.0.1:8080/v1/health

      - name: Cleanup
        if: always()
        run: docker rm -f tmforge-api || true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # PR-only supply-chain check; needs the repo Dependency Graph (on by default for
    # public repos). Flags newly introduced vulnerable dependencies.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dogfood:
    name: Analyze sample models
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Publish CLI
        run: dotnet publish src/ThreatModelForge.Cli/ThreatModelForge.Cli.csproj -c Release -o artifacts/cli

      # Run the tool against the threat models the repo itself ships: proof the CLI loads and analyzes
      # real .tm7 files, and the reference usage for the first-party action. These demo models are
      # intentionally imperfect, so findings (exit 2) are expected and do not fail the job; only a
      # model the tool cannot analyze at all (exit 1 / crash) is a failure.
      - name: Analyze the repo's own threat models
        run: |
          set -uo pipefail
          shopt -s nullglob
          mkdir -p artifacts/sarif
          models=( *.tm7 )
          if [ ${#models[@]} -eq 0 ]; then
            echo "::error::No sample .tm7 models found at the repo root to dogfood."
            exit 1
          fi
          rc=0
          for model in "${models[@]}"; do
            echo "::group::tmforge analyze $model"
            code=0
            dotnet artifacts/cli/tmforge.dll analyze "$model" --reportFolder artifacts/sarif || code=$?
            echo "::endgroup::"
            case "$code" in
              0) echo "clean: $model" ;;
              2) echo "findings: $model" ;;
              *) echo "::error::tmforge could not analyze $model (exit $code)."; rc=1 ;;
            esac
          done
          exit $rc

      - name: Upload SARIF reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sample-model-sarif
          path: artifacts/sarif
          if-no-files-found: warn

